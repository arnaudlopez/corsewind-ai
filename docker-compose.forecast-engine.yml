services:
  forecast-engine:
    build:
      context: .
      dockerfile: Dockerfile.forecast-engine
    image: corsewind/forecast-engine:local
    pull_policy: build
    container_name: corsewind-forecast-engine
    init: true
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 10m
    environment:
      PYTHONUNBUFFERED: "1"
      METEOFRANCE_API_KEY: ${METEOFRANCE_API_KEY:?Set METEOFRANCE_API_KEY in Portainer stack environment}
      MOLOCH_SOURCE_URL: ${MOLOCH_SOURCE_URL:-}
      ICON2I_SOURCE_URL: ${ICON2I_SOURCE_URL:-}
      WINDNINJA_ENABLED: ${WINDNINJA_ENABLED:-false}
      ML_DATASET_ROOT: ${ML_DATASET_ROOT:-/app/ml_dataset}
      ML_DATASET_MIN_FREE_GB: ${ML_DATASET_MIN_FREE_GB:-250}
      ML_DATASET_ARCHIVE_ENABLED: ${ML_DATASET_ARCHIVE_ENABLED:-false}
      ML_FEATURE_STORE_ENABLED: ${ML_FEATURE_STORE_ENABLED:-false}
      ML_NWP_EXTRA_FIELDS_ENABLED: ${ML_NWP_EXTRA_FIELDS_ENABLED:-false}
      ML_NWP_EXTRA_FIELDS_MAX_STEPS: ${ML_NWP_EXTRA_FIELDS_MAX_STEPS:-24}
      ML_NWP_EXTRA_FIELDS_REQUEST_SLEEP_SEC: ${ML_NWP_EXTRA_FIELDS_REQUEST_SLEEP_SEC:-0.2}
      ML_NWP_VERTICAL_PROFILES_ENABLED: ${ML_NWP_VERTICAL_PROFILES_ENABLED:-false}
      ML_NWP_VERTICAL_PROFILES_MAX_STEPS: ${ML_NWP_VERTICAL_PROFILES_MAX_STEPS:-5}
      ML_NWP_VERTICAL_PROFILES_PRESSURE_LEVELS_HPA: ${ML_NWP_VERTICAL_PROFILES_PRESSURE_LEVELS_HPA:-1000,925,850}
      ML_NWP_VERTICAL_PROFILES_REQUEST_SLEEP_SEC: ${ML_NWP_VERTICAL_PROFILES_REQUEST_SLEEP_SEC:-0.2}
      ML_EUMETSAT_CLOUD_MASK_ENABLED: ${ML_EUMETSAT_CLOUD_MASK_ENABLED:-false}
      ML_EUMETSAT_CLOUD_MASK_POLL_INTERVAL_SEC: ${ML_EUMETSAT_CLOUD_MASK_POLL_INTERVAL_SEC:-480}
      ML_EUMETSAT_CLOUD_MASK_WINDOW_MINUTES: ${ML_EUMETSAT_CLOUD_MASK_WINDOW_MINUTES:-120}
      ML_EUMETSAT_CLOUD_MASK_MAX_PRODUCTS: ${ML_EUMETSAT_CLOUD_MASK_MAX_PRODUCTS:-18}
      ML_EUMETSAT_THERMAL_PRODUCTS_ENABLED: ${ML_EUMETSAT_THERMAL_PRODUCTS_ENABLED:-false}
      ML_EUMETSAT_THERMAL_POLL_INTERVAL_SEC: ${ML_EUMETSAT_THERMAL_POLL_INTERVAL_SEC:-900}
      ML_EUMETSAT_THERMAL_WINDOW_MINUTES: ${ML_EUMETSAT_THERMAL_WINDOW_MINUTES:-180}
      ML_EUMETSAT_THERMAL_MAX_PRODUCTS: ${ML_EUMETSAT_THERMAL_MAX_PRODUCTS:-12}
      EUMETSAT_CONSUMER_KEY: ${EUMETSAT_CONSUMER_KEY:-}
      EUMETSAT_CONSUMER_SECRET: ${EUMETSAT_CONSUMER_SECRET:-}
      CORSEWIND_CONTAINER_ROOT: /app
    working_dir: /app
    volumes:
      - corsewind-data-raw:/app/data/raw
      - corsewind-data-processed:/app/data/processed
      - corsewind-reports:/app/reports
      - corsewind-tmp:/app/tmp
      - corsewind-wind2d:/app/visualizations/wind2d
      - ${ML_DATASET_HOST_ROOT:-./data/processed/ml_dataset}:/app/ml_dataset
    healthcheck:
      test: ["CMD", "python", "scripts/check_forecast_engine_health.py", "--max-status-age-sec", "7200"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    command:
      - sh
      - -c
      - >-
        python scripts/sync_wind2d_static.py &&
        exec python scripts/run_forecast_update_engine.py
        --poll-interval-sec 900
        --fast-window-poll-interval-sec 60
        --arome-poll-interval-sec 900
        --enable-aromepi
        --aromepi-poll-interval-sec 300
        --aromepi-stale-poll-interval-sec 60
        --aromepi-freshness-target-sec 900
        --aromepi-horizon-hours 24
        --aromepi-request-sleep-sec 1.3
        --enable-moloch
        --moloch-poll-interval-sec 1800
        --enable-icon2i
        --icon2i-poll-interval-sec 1800
        --source-error-backoff-sec 300
        --source-error-backoff-max-sec 1800
        --lock-stale-after-sec 3600
        --windninja-parallel 6
        --windninja-runtime-min 60

  wind2d-web:
    build:
      context: .
      dockerfile: Dockerfile.forecast-engine
    image: corsewind/forecast-engine:local
    pull_policy: build
    container_name: corsewind-wind2d-web
    init: true
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    working_dir: /app
    volumes:
      - corsewind-wind2d:/app/visualizations/wind2d
    ports:
      - "${WIND2D_WEB_PORT:-8769}:8769"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8769/visualizations/wind2d/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    command:
      - sh
      - -c
      - >-
        python scripts/sync_wind2d_static.py &&
        exec python scripts/serve_wind2d_compressed.py --host 0.0.0.0 --port 8769

volumes:
  corsewind-data-raw:
  corsewind-data-processed:
  corsewind-reports:
  corsewind-tmp:
  corsewind-wind2d:
